<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="H&R Cards" />
  <title>H&R Cards</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #020617; font-family: 'DM Sans', system-ui, sans-serif; overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; margin: 0; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    const SPORTS = ["baseball", "basketball", "football", "hockey", "soccer", "other"];
    const CONDITIONS = ["raw", "PSA 10", "PSA 9", "PSA 8", "PSA 7", "BGS 9.5", "BGS 9", "other"];

    function Badge({ children, color = "emerald" }) {
      const colors = {
        emerald: "bg-emerald-500/20 text-emerald-300 border-emerald-500/30",
        blue: "bg-blue-500/20 text-blue-300 border-blue-500/30",
        amber: "bg-amber-500/20 text-amber-300 border-amber-500/30",
        rose: "bg-rose-500/20 text-rose-300 border-rose-500/30",
        slate: "bg-slate-700/50 text-slate-300 border-slate-600/30",
        purple: "bg-purple-500/20 text-purple-300 border-purple-500/30",
      };
      return <span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${colors[color]}`}>{children}</span>;
    }

    function Modal({ open, onClose, title, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose} />
          <div className="relative w-full sm:max-w-lg bg-slate-900 border border-slate-700/50 rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="sticky top-0 bg-slate-900 border-b border-slate-800 px-5 py-4 flex items-center justify-between z-10">
              <h2 className="text-white font-bold text-lg">{title}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-800 transition-all">✕</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Input({ label, ...props }) {
      return (
        <div>
          {label && <label className="block text-xs font-medium text-slate-400 mb-1.5">{label}</label>}
          <input {...props} className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 focus:bg-slate-800 transition-all" />
        </div>
      );
    }

    function Select({ label, options, value, onChange, disabled }) {
      return (
        <div>
          {label && <label className="block text-xs font-medium text-slate-400 mb-1.5">{label}</label>}
          <select value={value} onChange={onChange} disabled={disabled} className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-emerald-500/50 transition-all appearance-none">
            <option value="">Select...</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      );
    }

    function Textarea({ label, ...props }) {
      return (
        <div>
          {label && <label className="block text-xs font-medium text-slate-400 mb-1.5">{label}</label>}
          <textarea {...props} rows={3} className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-all resize-none" />
        </div>
      );
    }

    function Btn({ children, onClick, variant = "primary", className = "", disabled }) {
      const base = "rounded-xl px-4 py-2.5 text-sm font-semibold transition-all disabled:opacity-40";
      const variants = {
        primary: "bg-emerald-500 hover:bg-emerald-400 text-white shadow-lg shadow-emerald-500/20",
        secondary: "bg-slate-800 hover:bg-slate-700 text-white border border-slate-700/50",
        danger: "bg-rose-500/20 hover:bg-rose-500/30 text-rose-300 border border-rose-500/30",
        ghost: "text-slate-400 hover:text-white hover:bg-slate-800/50",
      };
      return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
    }

    async function scanCardImage(base64Data, mimeType) {
      const response = await fetch("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mimeType, data: base64Data } },
              { type: "text", text: `Analyze this sports card image. Return ONLY valid JSON:\n{\n  "card_title": "full title",\n  "player_name": "full name",\n  "card_year": "year",\n  "card_brand": "brand",\n  "sport": "baseball|basketball|football|hockey|soccer|other",\n  "condition": "raw|PSA 10|PSA 9|PSA 8|PSA 7|BGS 9.5|BGS 9|other",\n  "serial_number": "e.g. 45/99 or empty"\n}` }
            ]
          }]
        })
      });
      const data = await response.json();
      const text = data.content?.map(i => i.text || "").join("") || "";
      return JSON.parse(text.replace(/```json|```/g, "").trim());
    }

    function SearchPage({ onSaveDeal, savedDeals }) {
      const [playerQuery, setPlayerQuery] = useState("");
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState([]);
      const [searched, setSearched] = useState(false);

      const alreadySaved = (title) => savedDeals.some(s => s.card_title === title);

      const handleSearch = async () => {
        if (!playerQuery.trim()) return;
        setLoading(true);
        setResults([]);
        setSearched(false);
        try {
          const response = await fetch("/.netlify/functions/claude", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{ role: "user", content: `Generate 6 realistic sports card listings for "${playerQuery}". Return ONLY a JSON array, no extra text:
[
  {
    "card_title": "e.g. 2023 Topps PlayerName #45",
    "player_name": "full name",
    "card_year": "year",
    "card_brand": "brand",
    "sport": "baseball|basketball|football|hockey|soccer|other",
    "condition": "raw|PSA 10|PSA 9|PSA 8",
    "listing_price": number,
    "estimated_value": number,
    "source_platform": "eBay|COMC|Whatnot|StockX",
    "serial_number": "e.g. 45/99 or empty string"
  }
]
Make the prices realistic for this player. Vary the cards (different years, brands, conditions, some numbered).` }]
            })
          });
          const data = await response.json();
          const text = data.content?.map(i => i.text || "").join("") || "";
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          setResults(parsed);
        } catch(e) {
          setResults([]);
        } finally {
          setLoading(false);
          setSearched(true);
        }
      };

      const sportColors = { baseball: "#f59e0b", basketball: "#f97316", football: "#84cc16", hockey: "#38bdf8", soccer: "#a78bfa", other: "#94a3b8" };

      return (
        <div className="max-w-2xl mx-auto px-4 py-6">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-white mb-1">Search Cards</h1>
            <p className="text-slate-400 text-sm">Type a player name to find card listings</p>
          </div>

          <div className="flex gap-2 mb-6">
            <input value={playerQuery} onChange={e => setPlayerQuery(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSearch()}
              placeholder="e.g. Matt Chapman, LeBron James..."
              className="flex-1 bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-all" />
            <button onClick={handleSearch} disabled={loading || !playerQuery.trim()}
              className="bg-emerald-500 hover:bg-emerald-400 disabled:opacity-40 text-white rounded-xl px-4 py-2.5 text-sm font-bold transition-all shadow-lg shadow-emerald-500/20 shrink-0">
              {loading
                ? <span className="flex items-center gap-2"><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block"></span>Searching</span>
                : "Search"}
            </button>
          </div>

          {!loading && results.length > 0 && (
            <div className="space-y-3">
              {results.map((card, i) => {
                const savings = card.estimated_value > 0 ? Math.round(((card.estimated_value - card.listing_price) / card.estimated_value) * 100) : 0;
                const color = sportColors[card.sport] || "#10b981";
                return (
                  <div key={i} className="rounded-2xl overflow-hidden shadow-lg" style={{background: "linear-gradient(135deg, #1e293b, #0f172a)", border: `1px solid ${color}33`}}>
                    <div className="h-0.5 w-full" style={{background: color}} />
                    <div className="p-4">
                      <div className="flex items-start justify-between gap-3">
                        <div className="flex-1 min-w-0">
                          <p className="text-white font-semibold text-sm">{card.card_title}</p>
                          <p className="text-slate-400 text-xs mt-0.5">{card.source_platform} · {card.condition}</p>
                          <div className="flex flex-wrap gap-1.5 mt-2">
                            <span className="text-xs px-2 py-0.5 rounded-full font-medium capitalize" style={{background: color + "20", color: color, border: `1px solid ${color}40`}}>{card.sport}</span>
                            {card.serial_number && <span className="text-xs px-2 py-0.5 rounded-full font-medium bg-amber-500/20 text-amber-300 border border-amber-500/30">#{card.serial_number}</span>}
                            {savings > 0 && <span className="text-xs px-2 py-0.5 rounded-full font-medium bg-emerald-500/20 text-emerald-300 border border-emerald-500/30">-{savings}%</span>}
                          </div>
                        </div>
                        <div className="text-right shrink-0">
                          <p className="font-bold text-lg" style={{color}}>${card.listing_price}</p>
                          {card.estimated_value > 0 && <p className="text-slate-500 text-xs line-through">${card.estimated_value}</p>}
                        </div>
                      </div>
                      <button
                        onClick={() => onSaveDeal({ ...card, id: Date.now() })}
                        disabled={alreadySaved(card.card_title)}
                        className="mt-3 w-full rounded-xl py-2.5 text-sm font-semibold transition-all disabled:opacity-50"
                        style={alreadySaved(card.card_title) ? {background: "#1e293b", color: "#64748b", border: "1px solid #334155"} : {background: color, color: "white"}}>
                        {alreadySaved(card.card_title) ? "✓ Saved" : "Save Deal"}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {!loading && searched && results.length === 0 && (
            <div className="text-center py-16 text-slate-500">
              <p className="text-4xl mb-3">😕</p>
              <p className="text-sm">No results found — try a different name</p>
            </div>
          )}

          {!loading && !searched && (
            <div className="text-center py-16 text-slate-500">
              <p className="text-5xl mb-3">🃏</p>
              <p className="text-sm">Type a player name and hit Search</p>
            </div>
          )}
        </div>
      );
    }

    function SavedDealsPage({ savedDeals, onDelete }) {
      const [filter, setFilter] = useState("all");
      const filtered = useMemo(() => filter === "all" ? savedDeals : savedDeals.filter(d => d.sport === filter), [savedDeals, filter]);
      return (
        <div className="max-w-2xl mx-auto px-4 py-6">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-white mb-1">Saved Deals</h1>
            <p className="text-slate-400 text-sm">{savedDeals.length} deal{savedDeals.length !== 1 ? "s" : ""} saved</p>
          </div>
          <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
            {["all", ...SPORTS].map(s => (
              <button key={s} onClick={() => setFilter(s)} className={`shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-all capitalize ${filter === s ? "bg-emerald-500 text-white" : "bg-slate-800 text-slate-400 hover:text-white"}`}>{s}</button>
            ))}
          </div>
          {filtered.length === 0 ? (
            <div className="text-center py-16 text-slate-500"><p className="text-5xl mb-3">🔖</p><p className="text-sm">No saved deals yet!</p></div>
          ) : (
            <div className="space-y-3">
              {filtered.map(deal => {
                const savings = deal.savings_percent ?? (deal.estimated_value > 0 ? Math.round(((deal.estimated_value - deal.listing_price) / deal.estimated_value) * 100) : 0);
                return (
                  <div key={deal.id} className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-4">
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <p className="text-white font-semibold text-sm">{deal.card_title}</p>
                        <p className="text-slate-400 text-xs mt-0.5">{deal.player_name}</p>
                        <div className="flex flex-wrap gap-1.5 mt-2">
                          {deal.sport && <Badge color="slate">{deal.sport}</Badge>}
                          {savings > 0 && <Badge color="emerald">-{savings}% below market</Badge>}
                        </div>
                        {deal.notes && <p className="text-slate-400 text-xs mt-2 italic">"{deal.notes}"</p>}
                      </div>
                      <div className="text-right shrink-0">
                        <p className="text-emerald-400 font-bold">${deal.listing_price}</p>
                        {deal.estimated_value > 0 && <p className="text-slate-500 text-xs line-through">${deal.estimated_value}</p>}
                      </div>
                    </div>
                    <div className="mt-3"><Btn variant="danger" onClick={() => onDelete(deal.id)}>Remove</Btn></div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function CollectionPage({ collection, onAdd, onDelete }) {
      const [addOpen, setAddOpen] = useState(false);
      const [filter, setFilter] = useState("all");
      const [scanning, setScanning] = useState(false);
      const [scanPreview, setScanPreview] = useState(null);
      const cameraRef = useRef(null);
      const fileRef = useRef(null);
      const emptyForm = { card_title: "", player_name: "", card_year: "", card_brand: "", sport: "", condition: "raw", purchase_price: "", estimated_value: "", serial_number: "", notes: "", for_trade: false };
      const [form, setForm] = useState(emptyForm);
      const f = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const processImage = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const dataUrl = ev.target.result;
          setScanPreview(dataUrl);
          setScanning(true);
          setAddOpen(true);
          try {
            const result = await scanCardImage(dataUrl.split(",")[1], file.type || "image/jpeg");
            setForm(prev => ({ ...prev, ...result }));
          } catch (err) {
            console.error("Scan failed", err);
          } finally {
            setScanning(false);
          }
        };
        reader.readAsDataURL(file);
      };

      const handleAdd = () => {
        if (!form.card_title.trim()) return;
        onAdd({ ...form, id: Date.now(), purchase_price: +form.purchase_price || 0, estimated_value: +form.estimated_value || 0 });
        setForm(emptyForm); setScanPreview(null); setAddOpen(false);
      };

      const closeModal = () => { setAddOpen(false); setScanPreview(null); setForm(emptyForm); };

      const filtered = useMemo(() => {
        if (filter === "all") return collection;
        if (filter === "for_trade") return collection.filter(c => c.for_trade);
        return collection.filter(c => c.sport === filter);
      }, [collection, filter]);

      const totalValue = collection.reduce((s, c) => s + (c.estimated_value || 0), 0);
      const totalPaid = collection.reduce((s, c) => s + (c.purchase_price || 0), 0);

      return (
        <div className="max-w-2xl mx-auto px-4 py-6">
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e => processImage(e.target.files?.[0])} />
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => processImage(e.target.files?.[0])} />

          <div className="flex items-start justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-white mb-1">My Collection</h1>
              <p className="text-slate-400 text-sm">{collection.length} card{collection.length !== 1 ? "s" : ""}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => cameraRef.current?.click()} className="flex items-center gap-1.5 px-3 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white border border-slate-700/50 text-sm font-semibold transition-all">
                📷 Scan
              </button>
              <Btn onClick={() => { setForm(emptyForm); setScanPreview(null); setAddOpen(true); }}>+ Add</Btn>
            </div>
          </div>

          {collection.length > 0 && (
            <div className="grid grid-cols-2 gap-3 mb-5">
              <div className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-4">
                <p className="text-xs text-slate-400 mb-1">Est. Total Value</p>
                <p className="text-emerald-400 font-bold text-xl">${totalValue.toLocaleString()}</p>
              </div>
              <div className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-4">
                <p className="text-xs text-slate-400 mb-1">Total Invested</p>
                <p className="text-white font-bold text-xl">${totalPaid.toLocaleString()}</p>
              </div>
            </div>
          )}

          <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
            {["all", ...SPORTS, "for_trade"].map(s => (
              <button key={s} onClick={() => setFilter(s)} className={`shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-all capitalize ${filter === s ? "bg-emerald-500 text-white" : "bg-slate-800 text-slate-400 hover:text-white"}`}>
                {s === "for_trade" ? "🔄 For Trade" : s}
              </button>
            ))}
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-16 text-slate-500">
              <p className="text-5xl mb-3">📦</p>
              <p className="text-sm mb-4">{filter === "all" ? "Your collection is empty!" : "No cards in this category"}</p>
              {filter === "all" && <button onClick={() => cameraRef.current?.click()} className="text-emerald-400 text-sm font-medium">📷 Tap to scan your first card</button>}
            </div>
          ) : (
            <div className="space-y-3">
              {filtered.map(card => (
                <div key={card.id} className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-4">
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <p className="text-white font-semibold text-sm">{card.card_title}</p>
                      {card.player_name && <p className="text-slate-400 text-xs mt-0.5">{card.player_name}</p>}
                      <div className="flex flex-wrap gap-1.5 mt-2">
                        {card.sport && <Badge color="slate">{card.sport}</Badge>}
                        {card.condition && card.condition !== "raw" && <Badge color="blue">{card.condition}</Badge>}
                        {card.serial_number && <Badge color="amber">#{card.serial_number}</Badge>}
                        {card.for_trade && <Badge color="purple">For Trade</Badge>}
                      </div>
                    </div>
                    <div className="text-right shrink-0">
                      {card.estimated_value > 0 && <p className="text-emerald-400 font-bold">${card.estimated_value}</p>}
                      {card.purchase_price > 0 && <p className="text-slate-500 text-xs">paid ${card.purchase_price}</p>}
                    </div>
                  </div>
                  <div className="mt-3"><Btn variant="danger" onClick={() => onDelete(card.id)}>Remove</Btn></div>
                </div>
              ))}
            </div>
          )}

          <Modal open={addOpen} onClose={closeModal} title={scanPreview ? "📷 Scanned Card" : "Add Card"}>
            <div className="space-y-3">
              {scanPreview && (
                <div className="relative rounded-xl overflow-hidden border border-slate-700/50">
                  <img src={scanPreview} alt="Card" className="w-full max-h-48 object-contain bg-slate-800" />
                  {scanning && (
                    <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center gap-2">
                      <div className="w-8 h-8 border-4 border-slate-600 border-t-emerald-400 rounded-full animate-spin" />
                      <p className="text-white text-sm font-medium">Reading card...</p>
                    </div>
                  )}
                  {!scanning && <div className="absolute top-2 right-2"><Badge color="emerald">✓ Scanned</Badge></div>}
                </div>
              )}
              {!scanPreview && (
                <button onClick={() => fileRef.current?.click()} className="w-full border-2 border-dashed border-slate-700 hover:border-emerald-500/50 rounded-xl p-5 text-center text-slate-400 hover:text-slate-300 transition-all">
                  <p className="text-2xl mb-1">📷</p>
                  <p className="text-sm font-medium">Upload card photo to auto-fill</p>
                  <p className="text-xs text-slate-500 mt-0.5">or fill in manually below</p>
                </button>
              )}
              <Input label="Card Title *" value={form.card_title} onChange={e => f("card_title", e.target.value)} placeholder="e.g. 2023 Topps Mike Trout #1" disabled={scanning} />
              <Input label="Player Name" value={form.player_name} onChange={e => f("player_name", e.target.value)} disabled={scanning} />
              <div className="grid grid-cols-2 gap-3">
                <Input label="Year" value={form.card_year} onChange={e => f("card_year", e.target.value)} placeholder="2023" disabled={scanning} />
                <Input label="Brand" value={form.card_brand} onChange={e => f("card_brand", e.target.value)} placeholder="Topps" disabled={scanning} />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Select label="Sport" options={SPORTS} value={form.sport} onChange={e => f("sport", e.target.value)} disabled={scanning} />
                <Select label="Condition" options={CONDITIONS} value={form.condition} onChange={e => f("condition", e.target.value)} disabled={scanning} />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Input label="Purchase Price ($)" type="number" value={form.purchase_price} onChange={e => f("purchase_price", e.target.value)} placeholder="0" disabled={scanning} />
                <Input label="Est. Value ($)" type="number" value={form.estimated_value} onChange={e => f("estimated_value", e.target.value)} placeholder="0" disabled={scanning} />
              </div>
              <Input label="Serial Number" value={form.serial_number} onChange={e => f("serial_number", e.target.value)} placeholder="e.g. 45/99" disabled={scanning} />
              <Textarea label="Notes" value={form.notes} onChange={e => f("notes", e.target.value)} placeholder="Any notes..." disabled={scanning} />
              <div className="flex items-center gap-3 py-1">
                <button onClick={() => f("for_trade", !form.for_trade)} className={`w-10 h-6 rounded-full transition-all ${form.for_trade ? "bg-emerald-500" : "bg-slate-700"}`}>
                  <div className={`w-4 h-4 bg-white rounded-full transition-all ${form.for_trade ? "translate-x-5" : "translate-x-1"}`} />
                </button>
                <label className="text-sm text-slate-300">Available for trade</label>
              </div>
              <div className="flex gap-2 pt-2">
                <Btn variant="secondary" onClick={closeModal} className="flex-1">Cancel</Btn>
                <Btn variant="primary" onClick={handleAdd} className="flex-1" disabled={!form.card_title.trim() || scanning}>
                  {scanning ? "Scanning..." : "Add to Collection"}
                </Btn>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    function TradesPage({ collection }) {
      const tradeable = collection.filter(c => c.for_trade);
      const [addOpen, setAddOpen] = useState(false);
      const [trades, setTrades] = useState([]);
      const [form, setForm] = useState({ partner: "", offering: "", seeking: "", notes: "" });
      const f = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
      const statusColors = { pending: "amber", accepted: "emerald", declined: "rose", completed: "blue" };

      return (
        <div className="max-w-2xl mx-auto px-4 py-6">
          <div className="flex items-start justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-white mb-1">Trades</h1>
              <p className="text-slate-400 text-sm">{tradeable.length} card{tradeable.length !== 1 ? "s" : ""} available to trade</p>
            </div>
            <Btn onClick={() => setAddOpen(true)}>+ New Trade</Btn>
          </div>
          {tradeable.length > 0 && (
            <div className="mb-6">
              <p className="text-xs font-medium text-slate-400 mb-2 uppercase tracking-wider">Your Trade Bait</p>
              <div className="flex flex-wrap gap-2">
                {tradeable.map(c => (
                  <div key={c.id} className="bg-slate-800/60 border border-slate-700/30 rounded-xl px-3 py-1.5">
                    <p className="text-white text-xs font-medium">{c.card_title}</p>
                    {c.estimated_value > 0 && <p className="text-emerald-400 text-xs">${c.estimated_value}</p>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {trades.length === 0 ? (
            <div className="text-center py-16 text-slate-500"><p className="text-5xl mb-3">🔄</p><p className="text-sm">No trades yet</p></div>
          ) : (
            <div className="space-y-3">
              {trades.map(trade => (
                <div key={trade.id} className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-4">
                  <div className="flex items-start justify-between gap-2 mb-3">
                    <p className="text-white font-semibold text-sm">{trade.partner}</p>
                    <Badge color={statusColors[trade.status] || "slate"}>{trade.status}</Badge>
                  </div>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div className="bg-slate-800/50 rounded-xl p-2.5"><p className="text-xs text-slate-500 mb-1">Offering</p><p className="text-white text-xs">{trade.offering || "—"}</p></div>
                    <div className="bg-slate-800/50 rounded-xl p-2.5"><p className="text-xs text-slate-500 mb-1">Seeking</p><p className="text-white text-xs">{trade.seeking || "—"}</p></div>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    {trade.status === "pending" && <>
                      <Btn variant="primary" className="text-xs px-3 py-1.5" onClick={() => setTrades(p => p.map(t => t.id === trade.id ? { ...t, status: "accepted" } : t))}>Accept</Btn>
                      <Btn variant="danger" className="text-xs px-3 py-1.5" onClick={() => setTrades(p => p.map(t => t.id === trade.id ? { ...t, status: "declined" } : t))}>Decline</Btn>
                    </>}
                    {trade.status === "accepted" && <Btn variant="secondary" className="text-xs px-3 py-1.5" onClick={() => setTrades(p => p.map(t => t.id === trade.id ? { ...t, status: "completed" } : t))}>Mark Complete</Btn>}
                    <Btn variant="ghost" className="text-xs px-3 py-1.5" onClick={() => setTrades(p => p.filter(t => t.id !== trade.id))}>Delete</Btn>
                  </div>
                </div>
              ))}
            </div>
          )}
          <Modal open={addOpen} onClose={() => setAddOpen(false)} title="New Trade">
            <div className="space-y-3">
              <Input label="Trade Partner *" value={form.partner} onChange={e => f("partner", e.target.value)} placeholder="Username or name" />
              <Textarea label="Offering" value={form.offering} onChange={e => f("offering", e.target.value)} placeholder="Cards you're offering..." />
              <Textarea label="Seeking" value={form.seeking} onChange={e => f("seeking", e.target.value)} placeholder="Cards you want in return..." />
              <Textarea label="Notes" value={form.notes} onChange={e => f("notes", e.target.value)} placeholder="Any notes..." />
              <div className="flex gap-2 pt-2">
                <Btn variant="secondary" onClick={() => setAddOpen(false)} className="flex-1">Cancel</Btn>
                <Btn variant="primary" onClick={() => { if (!form.partner.trim()) return; setTrades(p => [{ ...form, id: Date.now(), status: "pending" }, ...p]); setForm({ partner: "", offering: "", seeking: "", notes: "" }); setAddOpen(false); }} className="flex-1" disabled={!form.partner.trim()}>Create Trade</Btn>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    const PAGES = ["Search", "Saved", "Collection", "Trades"];
    const PAGE_ICONS = { Search: "🔍", Saved: "🔖", Collection: "📦", Trades: "🔄" };

    // ── AUTH ─────────────────────────────────────────────────────────────────────
    function getUsers() { try { return JSON.parse(localStorage.getItem("hrcards_users") || "{}"); } catch { return {}; } }
    function saveUsers(u) { localStorage.setItem("hrcards_users", JSON.stringify(u)); }
    function getUserData(email) { try { return JSON.parse(localStorage.getItem("hrcards_data_" + email) || "{}"); } catch { return {}; } }
    function saveUserData(email, data) { localStorage.setItem("hrcards_data_" + email, JSON.stringify(data)); }

    function AuthScreen({ onLogin }) {
      const [mode, setMode] = useState("login");
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");

      const handleSubmit = () => {
        setError("");
        if (!email.trim() || !password.trim()) return setError("Please fill in all fields.");
        const users = getUsers();
        if (mode === "signup") {
          if (!name.trim()) return setError("Please enter your name.");
          if (users[email]) return setError("An account with this email already exists.");
          if (password.length < 6) return setError("Password must be at least 6 characters.");
          users[email] = { name, email, password };
          saveUsers(users);
          onLogin({ name, email });
        } else {
          const user = users[email];
          if (!user) return setError("No account found with this email.");
          if (user.password !== password) return setError("Incorrect password.");
          onLogin(user);
        }
      };

      return (
        <div className="min-h-screen bg-slate-950 flex items-center justify-center px-4">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-2xl bg-emerald-500 flex items-center justify-center mx-auto mb-4 shadow-xl shadow-emerald-500/30">
                <span className="text-white font-bold text-2xl">H&R</span>
              </div>
              <h1 className="text-white font-bold text-2xl">H&R Cards</h1>
              <p className="text-slate-400 text-sm mt-1">Your sports card collection tracker</p>
            </div>

            <div className="bg-slate-900/60 border border-slate-800/50 rounded-2xl p-6">
              <div className="flex gap-1 mb-5 bg-slate-800/50 rounded-xl p-1">
                <button onClick={() => { setMode("login"); setError(""); }} className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${mode === "login" ? "bg-slate-700 text-white" : "text-slate-400"}`}>Log In</button>
                <button onClick={() => { setMode("signup"); setError(""); }} className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${mode === "signup" ? "bg-slate-700 text-white" : "text-slate-400"}`}>Sign Up</button>
              </div>

              <div className="space-y-3">
                {mode === "signup" && (
                  <div>
                    <label className="block text-xs font-medium text-slate-400 mb-1.5">Your Name</label>
                    <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. John Smith"
                      className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-all" />
                  </div>
                )}
                <div>
                  <label className="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
                  <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="you@example.com"
                    className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-all" />
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
                  <input value={password} onChange={e => setPassword(e.target.value)} type="password" placeholder="••••••••"
                    onKeyDown={e => e.key === "Enter" && handleSubmit()}
                    className="w-full bg-slate-800/60 border border-slate-700/50 rounded-xl px-3 py-2.5 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 transition-all" />
                </div>
                {error && <p className="text-rose-400 text-xs">{error}</p>}
                <button onClick={handleSubmit} className="w-full bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl py-3 text-sm font-bold transition-all shadow-lg shadow-emerald-500/20 mt-1">
                  {mode === "login" ? "Log In" : "Create Account"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("Search");
      const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem("hrcards_session") || "null"); } catch { return null; } });

      const loadData = (u) => {
        const d = getUserData(u.email);
        setCollection(d.collection || []);
        setSavedDeals(d.savedDeals || []);
      };

      const [collection, setCollection] = useState([]);
      const [savedDeals, setSavedDeals] = useState([]);

      const persistData = (col, deals) => {
        if (user) saveUserData(user.email, { collection: col, savedDeals: deals });
      };

      const updateCollection = (col) => { setCollection(col); persistData(col, savedDeals); };
      const updateDeals = (deals) => { setSavedDeals(deals); persistData(collection, deals); };

      const handleLogin = (u) => {
        localStorage.setItem("hrcards_session", JSON.stringify(u));
        setUser(u);
        const d = getUserData(u.email);
        setCollection(d.collection || []);
        setSavedDeals(d.savedDeals || []);
      };

      const handleLogout = () => {
        localStorage.removeItem("hrcards_session");
        setUser(null);
        setCollection([]);
        setSavedDeals([]);
      };

      if (!user) return <AuthScreen onLogin={handleLogin} />;

      return (
        <div className="min-h-screen bg-slate-950">
          <nav className="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/50" style={{paddingTop:"env(safe-area-inset-top)"}}>
            <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center">
                  <span className="text-white font-bold text-xs">H&R</span>
                </div>
                <span className="text-white font-bold text-lg hidden sm:block">H&R Cards</span>
              </div>
              <div className="hidden md:flex items-center gap-1">
                {PAGES.map(p => (
                  <button key={p} onClick={() => setPage(p)} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${page === p ? "bg-slate-800 text-white" : "text-slate-400 hover:text-white hover:bg-slate-800/50"}`}>
                    <span>{PAGE_ICONS[p]}</span> {p}
                  </button>
                ))}
                <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all">👤 {user.name || "Logout"}</button>
              </div>
            </div>
          </nav>
          <main className="pt-14 pb-20 md:pb-0">
            {page === "Search" && <SearchPage onSaveDeal={d => updateDeals([d, ...savedDeals])} savedDeals={savedDeals} />}
            {page === "Saved" && <SavedDealsPage savedDeals={savedDeals} onDelete={id => updateDeals(savedDeals.filter(d => d.id !== id))} />}
            {page === "Collection" && <CollectionPage collection={collection} onAdd={c => updateCollection([c, ...collection])} onDelete={id => updateCollection(collection.filter(c => c.id !== id))} />}
            {page === "Trades" && <TradesPage collection={collection} />}
          </main>
          <div className="fixed bottom-0 left-0 right-0 z-50 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800/50 md:hidden" style={{paddingBottom:"env(safe-area-inset-bottom)"}}>
            <div className="flex items-center justify-around h-16 max-w-2xl mx-auto px-2">
              {PAGES.map(p => (
                <button key={p} onClick={() => setPage(p)} className={`flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition-all ${page === p ? "text-emerald-400" : "text-slate-500"}`}>
                  <span className="text-xl">{PAGE_ICONS[p]}</span>
                  <span className="text-xs font-medium">{p}</span>
                </button>
              ))}
              <button onClick={handleLogout} className="flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition-all text-slate-500">
                <span className="text-xl">👤</span>
                <span className="text-xs font-medium">Logout</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
